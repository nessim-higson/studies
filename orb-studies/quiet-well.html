<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>orb studies — quiet well</title>
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600&f[]=switzer@400,500&display=swap" rel="stylesheet" />
<style>
  :root { --ink: #0a0b0d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--ink); overflow: hidden; }
  body { font-family: 'Switzer', system-ui, sans-serif; color: #eaeaea; -webkit-font-smoothing: antialiased; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* the content well — pure type on the calm void, no container */
  .well {
    position: fixed; z-index: 3; left: 50%; top: 50%;
    transform: translate(-50%, -46%);
    width: min(46ch, 70vw); text-align: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease, transform 0.7s cubic-bezier(0.22,1,0.3,1);
  }
  .well.show { opacity: 1; transform: translate(-50%, -50%); pointer-events: auto; }
  .well .tag { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(234,234,234,0.45); margin-bottom: 1.1em; }
  .well h2 { font-family: 'Clash Display'; font-weight: 600; font-size: clamp(30px, 6vw, 68px); line-height: 0.96; letter-spacing: -0.025em; margin-bottom: 0.35em; }
  .well p { font-size: clamp(14px, 1.7vw, 17px); line-height: 1.65; color: rgba(234,234,234,0.66); max-width: 40ch; margin: 0 auto; }
  .well .hero { width: min(52vw, 520px); aspect-ratio: 4/3; margin: 0 auto 1.4em; border-radius: 4px;
    background-size: cover; background-position: center; filter: grayscale(1) contrast(1.03);
    opacity: 0; transform: scale(0.98); transition: opacity 0.8s ease, transform 0.9s cubic-bezier(0.22,1,0.3,1); }
  .well.show .hero { opacity: 1; transform: scale(1); }

  .chrome { position: fixed; z-index: 5; pointer-events: none; }
  .wm { top: 22px; left: 26px; font-family: 'Clash Display'; font-weight: 600; font-size: 13px; letter-spacing: 0.26em; color: rgba(234,234,234,0.85); }
  .hint { bottom: 22px; left: 26px; font-size: 11px; letter-spacing: 0.04em; color: rgba(234,234,234,0.4); max-width: 32ch; line-height: 1.5; }
  .back { bottom: 22px; right: 26px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(234,234,234,0.55); opacity: 0; transition: opacity .5s; }
  a.nav { position: fixed; z-index: 6; top: 20px; right: 24px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(234,234,234,0.5); text-decoration: none; }
  a.nav:hover { color: #eaeaea; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="well" id="well"></div>
<div class="chrome wm">NEVVERLAND</div>
<div class="chrome hint">a living field. choose a word — the rest blurs and drifts to the edges, and the page rises in the clear. click the void to disperse back.</div>
<div class="chrome back" id="back">↑ click the void to release</div>
<a class="nav" href="./index.html">↩ studies</a>

<script>
const cv = document.getElementById('c'); const ctx = cv.getContext('2d');
const wellEl = document.getElementById('well'); const backEl = document.getElementById('back');
let W,H,DPR = Math.min(devicePixelRatio||1, 2);

const NODES = [
  { id:'nike', label:'Nike', tag:'Work — Motion identity', h:'Nike', p:'Twelve directions in ten days. The brief was speed; the answer was a system that moved — a mark that never holds the same pose twice.', img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=900&q=70' },
  { id:'hbo', label:'HBO', tag:'Work — Title sequence', h:'HBO', p:'Eight minutes of type that builds itself, frame by frame, into the world of the film before a single scene plays.', img:'https://images.unsplash.com/photo-1485846234645-a62644f84728?w=900&q=70' },
  { id:'sony', label:'Sony', tag:'Work — Launch film', h:'Sony', p:'A product reveal scored to light. Hardware shot like sculpture, cut to the rhythm of its own machinery.', img:'https://images.unsplash.com/photo-1593508512255-86ab42a8e620?w=900&q=70' },
  { id:'studio', label:'Studio', tag:'Who we are', h:'Studio', p:'A small team that treats interface as a material. We design things that behave, not just things that sit — founded in the space between film and software.', img:'' },
  { id:'play', label:'Play', tag:'The lab', h:'Play', p:'Experiments with no client and no deadline. Where the next idea is found before anyone thinks to ask for it.', img:'' },
  { id:'contact', label:'Contact', tag:'Say hello', h:'Contact', p:'hello@nevverland.studio — for projects, collaborations, or just to talk shop.', img:'' },
];

const orbs = NODES.map((n,i)=>({ node:n, x:0,y:0, homeX:0,homeY:0, r:0, baseR:0, phase:Math.random()*6.28, spd:0.5+Math.random()*0.6, hover:0, dim:0 }));
let active=-1, hover=-1;

function layout(){
  W=innerWidth; H=innerHeight; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
  const cx=W*0.5, cy=H*0.5, mobile=W<680;
  const rad=Math.min(W,H)*(mobile?0.34:0.30);
  orbs.forEach((o,i)=>{
    const a=-Math.PI/2 + i/orbs.length*Math.PI*2;
    o.homeX=cx+Math.cos(a)*rad*(mobile?1.0:1.5);
    o.homeY=cy+Math.sin(a)*rad*(mobile?1.15:0.92);
    o.baseR=(mobile?30:42)*Math.min(1.2, W/1100 + 0.3);
    if(o.x===0){ o.x=o.homeX; o.y=o.homeY; o.r=o.baseR; }
  });
}
addEventListener('resize', layout); layout();

let mx=-999,my=-999;
addEventListener('pointermove', e=>{ mx=e.clientX; my=e.clientY; if(active<0) pickHover(); });
function pickHover(){ hover=-1; let best=1e9; orbs.forEach((o,i)=>{ const d=Math.hypot(mx-o.x,my-o.y); if(d<o.r*1.5 && d<best){best=d;hover=i;} }); cv.style.cursor = hover>=0?'pointer':'default'; }

cv.addEventListener('click', ()=>{ if(active>=0){ release(); return; } if(hover>=0) select(hover); else release(); });
function select(i){ active=i; const n=orbs[i].node;
  wellEl.innerHTML = `${n.img?`<div class="hero" style="background-image:url('${n.img}')"></div>`:''}<div class="tag">${n.tag}</div><h2>${n.h}</h2><p>${n.p}</p>`;
  wellEl.classList.add('show'); backEl.style.opacity=1;
}
function release(){ active=-1; wellEl.classList.remove('show'); backEl.style.opacity=0; }

function frame(t){
  const time=t*0.001;
  ctx.clearRect(0,0,W,H);
  const cmx = active>=0 ? W*0.5 : -999, cmy = active>=0 ? H*0.5 : -999;

  orbs.forEach((o,i)=>{
    let tx,ty,tr,tdim,thov;
    if(active>=0){
      // everything drifts outward, blurs and dims — clearing the centre
      const ang=Math.atan2(o.homeY-H/2, o.homeX-W/2);
      const push=Math.max(W,H)*(i===active?0.66:0.52);
      tx=W/2+Math.cos(ang)*push; ty=H/2+Math.sin(ang)*push;
      tr=o.baseR*(i===active?1.1:0.85); tdim=1; thov=0;
    } else {
      o.phase+=0.004+o.spd*0.002;
      tx=o.homeX+Math.cos(o.phase*1.1+i)*22+Math.sin(o.phase*0.6)*12;
      ty=o.homeY+Math.sin(o.phase+i*1.3)*18+Math.cos(o.phase*0.4)*10;
      tr=o.baseR; tdim=0; thov=(hover===i)?1:0;
    }
    o.x+=(tx-o.x)*(active>=0?0.06:0.045);
    o.y+=(ty-o.y)*(active>=0?0.06:0.045);
    o.r+=(tr-o.r)*0.06; o.dim+=(tdim-o.dim)*0.05; o.hover+=(thov-o.hover)*0.12;

    const blur=o.dim*7;
    ctx.save();
    if(blur>0.2) ctx.filter=`blur(${blur}px)`;
    const baseAlpha = 0.55 - o.dim*0.40 + o.hover*0.25;
    // ring
    ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,6.2832);
    ctx.strokeStyle=`rgba(234,234,234,${Math.max(0,baseAlpha)})`;
    ctx.lineWidth=1.25; ctx.stroke();
    // faint fill on hover
    if(o.hover>0.01){ ctx.fillStyle=`rgba(234,234,234,${o.hover*0.05})`; ctx.fill(); }
    // soft core dot
    ctx.beginPath(); ctx.arc(o.x,o.y,2.2,0,6.2832);
    ctx.fillStyle=`rgba(234,234,234,${Math.max(0,baseAlpha*0.8)})`; ctx.fill();
    ctx.restore();

    // label
    ctx.save();
    if(blur>0.2) ctx.filter=`blur(${blur*0.8}px)`;
    ctx.font=`500 ${Math.max(12,o.r*0.42)}px 'Clash Display', sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=`rgba(234,234,234,${Math.max(0, 0.92 - o.dim*0.8 + o.hover*0.08)})`;
    ctx.fillText(o.node.label, o.x, o.y);
    ctx.restore();
  });

  // connective gossamer between near orbs (only while drifting) — keeps the field reading as one organism
  if(active<0){
    for(let i=0;i<orbs.length;i++) for(let j=i+1;j<orbs.length;j++){
      const a=orbs[i],b=orbs[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<Math.min(W,H)*0.34){ ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(234,234,234,${0.05*(1-d/(Math.min(W,H)*0.34))})`; ctx.lineWidth=1; ctx.stroke(); }
    }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
