<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arena Ring — POC</title>
  <style>
    :root { --fg: rgba(255,255,255,.7); }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #000; color: #fff; overflow: hidden;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* ---- overlay (HTML/SVG over WebGL, like the original) ---- */
    .overlay { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    .topbar {
      position: absolute; top: 24px; left: 0; right: 0;
      display: flex; justify-content: center;
      font-size: 11px; letter-spacing: .42em; text-transform: uppercase;
      color: var(--fg);
    }
    .headline {
      position: absolute; left: 50%; bottom: 22%; transform: translateX(-50%);
      text-align: center; line-height: .92;
      font-size: clamp(40px, 11vw, 150px); font-weight: 800; letter-spacing: -.03em;
    }
    .sub {
      position: absolute; left: 50%; bottom: 16%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: .42em; text-transform: uppercase; color: var(--fg);
    }
    .cta {
      position: absolute; left: 50%; bottom: 9%; transform: translateX(-50%);
      pointer-events: auto;
      background: #fff; color: #000; border: 0; border-radius: 999px;
      padding: 12px 26px; font: inherit; font-size: 12px; letter-spacing: .2em;
      text-transform: uppercase; cursor: pointer;
    }

    /* ---- ring-engine style control panel: static-by-default + opt-in motion ---- */
    .panel {
      position: fixed; top: 16px; right: 16px; z-index: 20; width: 230px;
      background: rgba(0,0,0,.55); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
      padding: 14px; font-size: 11px; letter-spacing: .04em; color: var(--fg);
    }
    .panel h2 { margin: 0 0 10px; font-size: 10px; letter-spacing: .25em; text-transform: uppercase; color: rgba(255,255,255,.4); }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 9px 0; }
    .row label { flex: 1; }
    .row input[type=range] { flex: 1.2; accent-color: #fff; }
    .row .val { width: 34px; text-align: right; color: #fff; font-variant-numeric: tabular-nums; }
    .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="overlay">
    <div class="topbar">The Arena&nbsp;&nbsp;//&nbsp;&nbsp;West Hollywood CA</div>
    <div class="headline">THE<br>ARENA</div>
    <div class="sub">Phase 0.5 — Recreation</div>
    <button class="cta">Claim your seat</button>
  </div>

  <div class="panel">
    <h2>Ring Engine</h2>
    <label class="toggle"><input id="motion" type="checkbox"> Motion</label>
    <div class="row"><label>Aberration</label><input id="aberration" type="range" min="0" max="3" step="0.01" value="0.85"><span class="val" id="aberration-v"></span></div>
    <div class="row"><label>Distortion</label><input id="distortion" type="range" min="0" max="1" step="0.01" value="0.35"><span class="val" id="distortion-v"></span></div>
    <div class="row"><label>Bloom</label><input id="bloom" type="range" min="0" max="2.5" step="0.01" value="0.9"><span class="val" id="bloom-v"></span></div>
    <div class="row"><label>Glow</label><input id="emissive" type="range" min="0" max="6" step="0.05" value="2.2"><span class="val" id="emissive-v"></span></div>
    <div class="row"><label>Count</label><input id="count" type="range" min="6" max="64" step="1" value="28"><span class="val" id="count-v"></span></div>
    <div class="row"><label>Spin</label><input id="speed" type="range" min="0" max="2" step="0.01" value="0.5"><span class="val" id="speed-v"></span></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
